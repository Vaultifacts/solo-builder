name: Smoke Test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install anthropic flask

      - name: Run CLI (headless 3 steps) and assert 6+ verified
        working-directory: solo_builder
        run: |
          PYTHONIOENCODING=utf-8 python solo_builder_cli.py \
            --headless --auto 3 --no-resume --output-format json \
          | python - <<'EOF'
          import json, sys
          data     = json.load(sys.stdin)
          verified = data["verified"]
          total    = data["total"]
          print(f"Verified: {verified}/{total}")
          assert verified >= 6, f"Expected 6+ verified subtasks, got {verified}"
          print("PASS")
          EOF
