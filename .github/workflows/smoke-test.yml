name: Smoke Test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install anthropic flask

      - name: Run CLI (headless 3 steps)
        run: PYTHONIOENCODING=utf-8 python solo_builder_cli.py --headless --auto 3 --no-resume

      - name: Assert 6+ subtasks verified
        run: |
          python - <<'EOF'
          import json
          with open("state/solo_builder_state.json") as f:
              state = json.load(f)
          verified = sum(
              1 for t in state["dag"].values()
              for b in t["branches"].values()
              for s in b["subtasks"].values()
              if s.get("status") == "Verified"
          )
          total = sum(
              1 for t in state["dag"].values()
              for b in t["branches"].values()
              for s in b["subtasks"].values()
          )
          print(f"Verified: {verified}/{total}")
          assert verified >= 6, f"Expected >=6, got {verified}"
          print("PASS")
          EOF
